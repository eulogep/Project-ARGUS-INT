# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to use when generating slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty migrations to be created
# if no changes are detected by autogenerate
# version_locations = %(here)s/alembic/versions

# version path separator; defaults to os.pathsep.
# Use os.pathsep (colon on Unix, semicolon on Windows) or
# a custom character (like comma or space)
# version_path_separator = :

# set to 'true' to search for newer versions of migration files in parent directories
# of version_locations
# search_parent_directories = false

# set to 'true' to use the parent directory's configuration when running
# from a subdirectory
# use_parent_directory = false

sqlalchemy.url = postgresql://phynx:changeme@localhost:5432/phynx

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
