# .github/workflows/ci-cd.yml
# ============================================================================
# ARGUS-INT CI/CD Pipeline with Supply Chain Security
# Lint → Test → Build → Scan → Sign → Push
# ============================================================================

name: ARGUS-INT CI/CD Pipeline

on:
  push:
    branches: [main, 'feat/**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COSIGN_EXPERIMENTAL: 1

# Prevent concurrent deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Job 1: Code Quality & Security Linting
  # ==========================================================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit verification

      - name: Verify GPG signatures on commits
        run: |
          # Import the public GPG key if it exists to allow verification
          if [ -f "bugbounty/PGP_KEY.asc" ]; then
            gpg --import bugbounty/PGP_KEY.asc
          fi
          # Check that all commits in PR are GPG signed
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMITS=$(git log --format="%H" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
            for COMMIT in $COMMITS; do
              if ! git verify-commit $COMMIT 2>/dev/null; then
                echo "❌ Commit $COMMIT is not GPG signed"
                exit 1
              fi
            done
            echo "✅ All commits are GPG signed"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint || true

      - name: Run TypeScript type check
        working-directory: ./frontend
        run: npm run type-check || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt || true
          pip install ruff mypy bandit safety

      - name: Run Ruff (Python linter)
        working-directory: ./backend
        run: ruff check app/ || true

      - name: Run MyPy (type checking)
        working-directory: ./backend
        run: mypy app/ --ignore-missing-imports || true

      - name: Run Bandit (security linter)
        working-directory: ./backend
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: Check for vulnerable dependencies
        working-directory: ./backend
        run: safety check -r requirements.txt || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            backend/bandit-report.json
          retention-days: 30

  # ==========================================================================
  # Job 2: Automated Testing
  # ==========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: argus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: ./frontend
        run: npm run test -- --coverage --watchAll=false || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx testcontainers

      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/argus_test
          REDIS_URL: redis://localhost:6379/0
          AUTH_MODE: no-auth
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=html -v

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml,./frontend/coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================================================
  # Job 3: Build & Security Scan Docker Images
  # ==========================================================================
  build:
    name: Build & Scan Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write  # For Cosign keyless signing
      security-events: write  # For Trivy SARIF upload
    strategy:
      matrix:
        component: [frontend, backend]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.component }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail on CRITICAL/HIGH vulnerabilities

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.component }}.sarif'

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.component }}.cyclonedx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component }}
          path: sbom-${{ matrix.component }}.cyclonedx.json
          retention-days: 90

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.3'

      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

  # ==========================================================================
  # Job 4: End-to-End Testing (on built images)
  # ==========================================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start test stack
        run: |
          docker compose -f docker-compose.prod.yml up -d
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Verify services health
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:3000 || exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: ./frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: ./frontend
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v

  # ==========================================================================
  # Job 5: Blockchain Anchoring (Release Tags Only)
  # ==========================================================================
  anchor:
    name: Anchor Release on Blockchain
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release archive
        run: |
          git archive --format=tar.gz -o argus-int-${{ github.ref_name }}.tar.gz ${{ github.ref_name }}

      - name: Install OpenTimestamps client
        run: |
          pip install opentimestamps-client

      - name: Timestamp release on Bitcoin blockchain
        run: |
          ots stamp argus-int-${{ github.ref_name }}.tar.gz
          ls -la argus-int-${{ github.ref_name }}.tar.gz.ots

      - name: Upload timestamp proof as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            argus-int-${{ github.ref_name }}.tar.gz
            argus-int-${{ github.ref_name }}.tar.gz.ots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
