# ==============================================================================
# Project ARGUS-INT - Multi-Container Production Stack
# ==============================================================================

version: '3.8'

networks:
  frontend-net:
    driver: bridge
    internal: false
  backend-net:
    driver: bridge
    internal: true
  db-net:
    driver: bridge
    internal: true

volumes:
  postgres_prod_data:
    driver: local
  neo4j_prod_data:
    driver: local
  neo4j_prod_logs:
    driver: local

services:
  # --- PostgreSQL Database Service ---
  postgres:
    image: postgres:16-alpine
    container_name: argus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phynx}
      POSTGRES_USER: ${POSTGRES_USER:-phynx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phynx} -d ${POSTGRES_DB:-phynx}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Neo4j Graph Database Service ---
  neo4j:
    image: neo4j:5.19.0-community
    container_name: argus-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*'
    volumes:
      - neo4j_prod_data:/data
      - neo4j_prod_logs:/logs
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- Redis Queue & Caching Service ---
  redis:
    image: redis:7-alpine
    container_name: argus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - db-net
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FastAPI Gateway Service ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-phynx}
      POSTGRES_USER: ${POSTGRES_USER:-phynx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "8000:8000"
    networks:
      - frontend-net
      - backend-net
      - db-net

  # --- Celery Worker (Identity Queue) ---
  celery-worker-identity:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argus-worker-identity
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info -Q identity
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-phynx}
      POSTGRES_USER: ${POSTGRES_USER:-phynx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    networks:
      - backend-net
      - db-net

  # --- Next.js Frontend C2 Service ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: argus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    networks:
      - frontend-net
